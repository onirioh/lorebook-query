<div class="lorebook-tool-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Lorebook Tool Call</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            
            <div class="flex-container" style="margin-bottom: 10px;">
                <input id="loretool_global_disable" type="checkbox" />
                <label for="loretool_global_disable"><b>Desactivar extensión (Global)</b></label>
            </div>
            
            <hr class="sysHR" />
            <p><b>Ajustes del Personaje Actual</b></p>

            <div class="flex-container">
                <input id="loretool_char_disable" type="checkbox" />
                <label for="loretool_char_disable">Desactivar herramienta para este personaje</label>
            </div>

            <div class="flex-container">
                <label for="loretool_name">Nombre de la herramienta:</label>
                <input id="loretool_name" type="text" class="text_pole" placeholder="consultar_lorebook" />
            </div>

            <div class="flex-container">
                <label for="loretool_desc">Descripción de la herramienta:</label>
                <textarea id="loretool_desc" class="text_pole" rows="3" placeholder="Busca información en el lorebook sobre el mundo, personajes o eventos."></textarea>
            </div>

        </div>
    </div>
</div>
