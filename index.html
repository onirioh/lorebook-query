<div class="lorebook-tool-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Lorebook Query</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content" style="display:none;">
            
            <div class="flex-container alignitemscenter margin-bot-10px">
                <label class="checkbox_label">
                    <input type="checkbox" id="lbtc_global_enable">
                    <span>Enable Global Extension</span>
                </label>
            </div>

            <hr>
            <h4>Current Character Settings</h4>
            <div id="lbtc_char_settings_container">
                <div class="flex-container alignitemscenter margin-bot-10px">
                    <label class="checkbox_label">
                        <input type="checkbox" id="lbtc_char_enable">
                        <span>Enable Tool for this Character</span>
                    </label>
                </div>

                <label for="lbtc_tool_name">Tool Name:</label>
                <input type="text" id="lbtc_tool_name" class="text_pole" placeholder="query_lorebook">
                <small>Must contain only a-z, A-Z, 0-9, and underscores.</small>

                <label for="lbtc_tool_desc" style="margin-top: 10px; display:block;">Tool Description:</label>
                <textarea id="lbtc_tool_desc" class="text_pole" rows="3"></textarea>
            </div>
            <div id="lbtc_no_char_warning" style="display:none; color: var(--SmartThemeAlertColor);">
                Please select a character to edit per-character settings.
            </div>

        </div>
    </div>
</div>
